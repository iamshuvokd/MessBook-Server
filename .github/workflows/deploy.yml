# Builds and deploys the server on every push to main. Inactive until the
# repo secrets below are added (Step 9 — deploy) -- until then this
# workflow will simply fail at the "deploy" step, which is harmless.
#
# Required repo secrets (add at deploy time):
#   DROPLET_HOST      - the DigitalOcean droplet's IP or domain
#   DROPLET_SSH_KEY    - private key with access to the droplet
#   DROPLET_USER       - ssh user (e.g. root or a deploy user)
name: Deploy server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Backs the DB-touching integration tests (sync push/pull, groups
    # bring-online/join) — the same MySQL 8 image docker-compose.yml uses
    # for local dev, so behavior matches what actually runs in production.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: mess_manager
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptestroot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: testroot
      DB_NAME: mess_manager
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # `latest` for the deploy script's `pull && up -d`, plus the commit
          # SHA as an immutable tag — without it, a bad `latest` deploy has
          # no earlier image reference left to roll back to.
          tags: |
            ghcr.io/${{ github.repository_owner }}/mess-manager-server:latest
            ghcr.io/${{ github.repository_owner }}/mess-manager-server:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/mess-manager-server
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
