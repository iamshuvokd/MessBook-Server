# Local dev stack: api + MySQL 8 + Adminer (DB browser at :8080).
# `docker compose up` — code changes hot-reload via `node --watch`.
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: mess_manager
    ports:
      # Overridable per-machine via MYSQL_HOST_PORT in a local .env — useful
      # when host 3306 is already taken by a system MySQL install. Doesn't
      # affect the api container, which always reaches this over the
      # internal Docker network on the container's normal 3306.
      - '${MYSQL_HOST_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pdevroot']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: devroot
      DB_NAME: mess_manager
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: ['npm', 'run', 'dev']

volumes:
  mysql_data:
